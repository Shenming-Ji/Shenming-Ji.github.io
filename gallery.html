<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Ji | Plog</title>
    <meta name="description" content="A curated photography plog by Simon Ji, featuring natural light, after dark, and gear notes.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f6f4;
            --bg-soft: #efefec;
            --surface: rgba(255, 255, 255, 0.82);
            --surface-strong: rgba(255, 255, 255, 0.98);
            --line: rgba(43, 34, 25, 0.12);
            --line-strong: rgba(43, 34, 25, 0.2);
            --text: #201a15;
            --muted: #6d6156;
            --accent: #8a8178;
            --accent-soft: #ddd8d1;
            --shadow: 0 24px 60px rgba(55, 39, 22, 0.08);
            --serif: "Cormorant Garamond", Georgia, serif;
            --sans: "Manrope", "Segoe UI", sans-serif;
            --radius-xl: 30px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 999px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: var(--sans);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 30%),
                radial-gradient(circle at bottom right, rgba(232, 232, 228, 0.42), transparent 30%),
                linear-gradient(180deg, #fbfbfa 0%, var(--bg) 56%, #f1f1ee 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.18) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.16), transparent 72%);
            opacity: 0.28;
        }

        a {
            color: inherit;
        }

        .page-shell {
            max-width: 1440px;
            margin: 0 auto;
            padding: 28px 24px 40px;
            display: grid;
            grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
            gap: 30px;
            position: relative;
        }

        .sidebar {
            position: sticky;
            top: 112px;
            align-self: start;
            margin-top: 88px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: var(--radius-xl);
        }

        .sidebar-card {
            padding: 24px;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.88rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--muted);
            margin-bottom: 22px;
        }

        .home-link::before {
            content: "";
            width: 34px;
            height: 1px;
            background: var(--line-strong);
        }

        .sidebar-meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin: 8px 0 0;
        }

        .meta-card {
            padding: 12px 14px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.52);
            border: 1px solid rgba(43, 34, 25, 0.08);
        }

        .meta-label {
            display: block;
            font-size: 0.72rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .meta-value {
            display: block;
            font-size: 1rem;
            font-weight: 600;
        }

        .filter-block {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid rgba(43, 34, 25, 0.09);
        }

        .filter-heading {
            margin: 0 0 14px;
            font-size: 0.78rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .filter-list {
            display: grid;
            gap: 8px;
        }

        .tag-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 18px;
            text-decoration: none;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.46);
            color: var(--text);
            transition: transform 0.24s ease, background 0.24s ease, border-color 0.24s ease, color 0.24s ease;
        }

        .tag-link:hover {
            transform: translateY(-1px);
            border-color: rgba(43, 34, 25, 0.14);
            background: rgba(255, 255, 255, 0.72);
        }

        .tag-link.active {
            background: var(--text);
            color: #fff;
        }

        .tag-link.active .tag-count {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
        }

        .tag-label {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .tag-count {
            min-width: 32px;
            padding: 5px 9px;
            border-radius: var(--radius-sm);
            background: rgba(32, 26, 21, 0.08);
            color: var(--muted);
            text-align: center;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .sidebar-footer {
            margin-top: 18px;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.5;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .content {
            display: grid;
            gap: 24px;
        }

        .gallery {
            column-count: 2;
            column-gap: 22px;
        }

        .gallery.gear-mode {
            column-count: 1;
            column-gap: 0;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 22px;
            opacity: 0;
            animation: fadeUp 0.65s ease forwards;
        }

        .gallery-link {
            display: block;
            text-decoration: none;
            background: var(--surface-strong);
            border: 1px solid rgba(43, 34, 25, 0.09);
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 18px 48px rgba(55, 39, 22, 0.06);
            transition: transform 0.26s ease, box-shadow 0.26s ease, border-color 0.26s ease;
        }

        .gallery-link:hover {
            transform: translateY(-5px);
            border-color: rgba(43, 34, 25, 0.15);
            box-shadow: 0 24px 54px rgba(55, 39, 22, 0.1);
        }

        .gallery-image-wrap {
            overflow: hidden;
            border-radius: 18px;
            background: #ecebe8;
        }

        .gallery-item img {
            display: block;
            width: 100%;
            height: auto;
            transition: transform 0.55s ease;
        }

        .gallery-link:hover img {
            transform: scale(1.035);
        }

        .caption {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 4px 4px;
        }

        .caption-title {
            font-family: var(--serif);
            font-size: 1.38rem;
            line-height: 1.05;
            font-weight: 600;
        }

        .caption-tag {
            color: var(--muted);
            font-size: 0.72rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .equipment-view,
        .empty-state {
            background: var(--surface-strong);
            border: 1px solid rgba(43, 34, 25, 0.09);
            border-radius: 30px;
            padding: 28px;
            box-shadow: 0 18px 48px rgba(55, 39, 22, 0.06);
            animation: fadeUp 0.7s ease both;
        }

        .equipment-view {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(240px, 0.85fr);
            gap: 28px;
            align-items: center;
        }

        .equipment-copy span {
            display: inline-block;
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 0.76rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .equipment-copy h2 {
            margin: 0 0 10px;
            font-family: var(--serif);
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 0.98;
            font-weight: 600;
        }

        .equipment-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .equipment-specs div {
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            background: rgba(32, 26, 21, 0.06);
            color: var(--text);
            font-size: 0.83rem;
            font-weight: 600;
        }

        .equipment-image {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .equipment-image img {
            display: block;
            width: min(100%, 340px);
            height: auto;
        }

        .empty-state {
            text-align: center;
            color: var(--muted);
        }

        .empty-state strong {
            display: block;
            color: var(--text);
            font-family: var(--serif);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 8px;
            padding: 0 8px 8px;
            animation: fadeUp 0.9s ease both;
        }

        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-info {
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 600;
        }

        .page-btn {
            border: 1px solid rgba(43, 34, 25, 0.1);
            background: rgba(255, 255, 255, 0.68);
            color: var(--text);
            border-radius: var(--radius-sm);
            min-width: 52px;
            height: 46px;
            padding: 0 18px;
            font: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.22s ease, background 0.22s ease, opacity 0.22s ease;
        }

        .page-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.9);
        }

        .page-btn:disabled {
            opacity: 0.38;
            cursor: not-allowed;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 28px;
            background: rgba(18, 13, 10, 0.86);
            z-index: 9999;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-figure {
            position: relative;
            margin: 0;
            max-width: min(92vw, 1240px);
            max-height: 88vh;
            display: grid;
            gap: 14px;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: calc(88vh - 72px);
            border-radius: 22px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
        }

        .lightbox-caption {
            color: rgba(255, 255, 255, 0.82);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.95rem;
        }

        .lightbox-caption strong {
            font-family: var(--serif);
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
        }

        .lightbox-close {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 42px;
            height: 42px;
            border: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            font-size: 1.5rem;
            line-height: 1;
            cursor: pointer;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1100px) {
            .page-shell {
                grid-template-columns: minmax(240px, 290px) minmax(0, 1fr);
            }
        }

        @media (max-width: 860px) {
            .page-shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                top: auto;
                margin-top: 0;
            }

            .gallery {
                column-count: 2;
            }

            .equipment-view {
                grid-template-columns: 1fr;
                gap: 18px;
            }
        }

        @media (max-width: 640px) {
            .page-shell {
                padding: 18px 16px 30px;
                gap: 18px;
            }

            .sidebar-card,
            .equipment-view,
            .empty-state {
                padding: 22px;
                border-radius: 24px;
            }

            .sidebar-meta {
                grid-template-columns: 1fr;
            }

            .pagination,
            .lightbox-caption {
                align-items: flex-start;
                flex-direction: column;
            }

            .gallery {
                column-count: 1;
                column-gap: 0;
            }

            .caption {
                flex-direction: column;
                align-items: flex-start;
            }

            .pagination-controls {
                width: 100%;
                justify-content: space-between;
            }

            .page-btn {
                flex: 1 1 0;
            }

            .lightbox {
                padding: 18px;
            }

            .lightbox-close {
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <aside class="sidebar">
            <div class="panel sidebar-card">
                <a class="home-link" href="./">Back Home</a>
                <div class="sidebar-meta">
                    <div class="meta-card">
                        <span class="meta-label">Current View</span>
                        <span class="meta-value" id="currentFilterLabel">All Frames</span>
                    </div>
                    <div class="meta-card">
                        <span class="meta-label">On Display</span>
                        <span class="meta-value" id="photoCount">0 photographs</span>
                    </div>
                </div>

                <div class="filter-block">
                    <p class="filter-heading">Browse</p>
                    <div class="filter-list">
                        <a class="tag-link active" data-filter="all" href="?filter=all">
                            <span class="tag-label">All Frames</span>
                            <span class="tag-count" data-count-for="all">0</span>
                        </a>
                        <a class="tag-link" data-filter="day" href="?filter=day">
                            <span class="tag-label">Natural Light</span>
                            <span class="tag-count" data-count-for="day">0</span>
                        </a>
                        <a class="tag-link" data-filter="night" href="?filter=night">
                            <span class="tag-label">After Dark</span>
                            <span class="tag-count" data-count-for="night">0</span>
                        </a>
                        <a class="tag-link" data-filter="gear" href="?filter=gear">
                            <span class="tag-label">Gear Notes</span>
                            <span class="tag-count" data-count-for="gear">1</span>
                        </a>
                    </div>
                </div>

                <p class="sidebar-footer">© 2026, Simon Ji</p>
            </div>
        </aside>

        <main class="content">
            <section class="gallery" id="gallery" aria-live="polite"></section>

            <div class="pagination" id="pagination">
                <span class="page-info" id="pageInfo">Page 1 of 1</span>
                <div class="pagination-controls">
                    <button class="page-btn" id="prevBtn" type="button" aria-label="Previous page">&larr;</button>
                    <button class="page-btn" id="nextBtn" type="button" aria-label="Next page">&rarr;</button>
                </div>
            </div>
        </main>
    </div>

    <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Photo viewer">
        <figure class="lightbox-figure">
            <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close viewer">&times;</button>
            <img class="lightbox-image" id="lightboxImage" src="" alt="">
            <figcaption class="lightbox-caption">
                <strong id="lightboxTitle"></strong>
                <span id="lightboxTag"></span>
            </figcaption>
        </figure>
    </div>

    <script>
        const photos = [
            { caption: "Road back home", img: "images/Road_back_home.JPG", tags: "night" },
            { caption: "IFS", img: "images/IFS.JPG", tags: "night" },
            { caption: "Library", img: "images/Lib.JPG", tags: "night" },
            { caption: "A&M Bell Tower", img: "images/Bell_tower.JPG", tags: "night" },
            { caption: "Station", img: "images/Station.JPG", tags: "night" },
            { caption: "Crowd", img: "images/Crowd.JPG", tags: "night" },
            { caption: "Legacy & Vision", img: "images/DSC_2009.jpg", tags: "night" },
            { caption: "Lotus", img: "images/DSC_2428.jpg", tags: "day" },
            { caption: "Ancient Lighthouse", img: "images/DSC_2403.jpg", tags: "day" },
            { caption: "Lake View", img: "images/Lakeview.JPG", tags: "day" },
            { caption: "Silence", img: "images/f469249cd7dc29f9e1082b942ed40206.JPG", tags: "day" },
            { caption: "Main Library", img: "images/MainLibrary.JPG", tags: "day" },
            { caption: "Tech", img: "images/Tech.JPG", tags: "day" },
            { caption: "Meditation", img: "images/Zone.JPG", tags: "day" },
            { caption: "Skyscraper", img: "images/Skyscraper.JPG", tags: "night" },
            { caption: "Aurora", img: "images/Aurora.JPG", tags: "night" },
            { caption: "Snow Fog", img: "images/Snow fog.jpg", tags: "day" },
            { caption: "CHRISTKINDL MARKET", img: "images/CHRISTKINDL MARKET.JPG", tags: "night" },
            { caption: "Christmas tree", img: "images/Christmas tree.JPG", tags: "day" },
            { caption: "Ferry", img: "images/Ferry.JPG", tags: "day" },
            { caption: "Lady Liberty", img: "images/Lady Liberty.JPG", tags: "day" },
            { caption: "Night NYC", img: "images/Night NYC.jpg", tags: "night" },
            { caption: "Ice Skating", img: "images/Ice Skating.JPG", tags: "night" },
            { caption: "Sunrise", img: "images/sunrise.jpg", tags: "day" },
            { caption: "Spring D.C.", img: "images/DC_sakura.JPG", tags: "day" }
        ];

        const filterLabels = {
            all: "All Frames",
            day: "Natural Light",
            night: "After Dark",
            gear: "Gear Notes"
        };

        const photosReversed = photos.slice().reverse();
        const PHOTOS_PER_PAGE = 12;
        let currentPage = 1;
        let activeFilter = "all";

        const gallery = document.getElementById("gallery");
        const pageInfo = document.getElementById("pageInfo");
        const currentFilterLabel = document.getElementById("currentFilterLabel");
        const photoCount = document.getElementById("photoCount");
        const pagination = document.getElementById("pagination");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const lightbox = document.getElementById("lightbox");
        const lightboxImage = document.getElementById("lightboxImage");
        const lightboxTitle = document.getElementById("lightboxTitle");
        const lightboxTag = document.getElementById("lightboxTag");
        const lightboxClose = document.getElementById("lightboxClose");

        function getFilteredPhotos() {
            if (activeFilter === "all") return photosReversed.slice();
            if (activeFilter === "gear") return [];
            return photosReversed.filter((photo) => (photo.tags || "").split(/\s+/).includes(activeFilter));
        }

        function getTagLabel(tag) {
            return filterLabels[tag] || "Collection";
        }

        function updateFilterCounts() {
            const counts = {
                all: photosReversed.length,
                day: photosReversed.filter((photo) => (photo.tags || "").includes("day")).length,
                night: photosReversed.filter((photo) => (photo.tags || "").includes("night")).length,
                gear: 1
            };

            document.querySelectorAll("[data-count-for]").forEach((node) => {
                const key = node.getAttribute("data-count-for");
                node.textContent = counts[key];
            });
        }

        function updateTagLinksUI() {
            document.querySelectorAll(".tag-link").forEach((link) => {
                const isActive = link.getAttribute("data-filter") === activeFilter;
                link.classList.toggle("active", isActive);
                link.setAttribute("aria-current", isActive ? "page" : "false");
            });
        }

        function updateSummary(totalPages, totalItems) {
            const label = getTagLabel(activeFilter);
            currentFilterLabel.textContent = label;

            if (activeFilter === "gear") {
                photoCount.textContent = "1 camera setup";
                pageInfo.textContent = "Equipment view";
                return;
            }

            const noun = totalItems === 1 ? "photograph" : "photographs";
            photoCount.textContent = totalItems + " " + noun;
            pageInfo.textContent = "Page " + currentPage + " of " + totalPages;
        }

        function renderEquipmentView() {
            gallery.innerHTML = `
                <article class="equipment-view">
                    <div class="equipment-copy">
                        <span>Current Setup</span>
                        <h2>Nikon Z30</h2>
                        <div class="equipment-specs">
                            <div>16-50mm kit lens</div>
                            <div>Viltrox 56mm f/1.7</div>
                        </div>
                    </div>
                    <div class="equipment-image">
                        <img src="images/NikonZ30.png" alt="Nikon Z30 camera setup">
                    </div>
                </article>
            `;
        }

        function renderEmptyState() {
            gallery.innerHTML = `
                <article class="empty-state">
                    <strong>No frames here yet.</strong>
                    <span>Try another filter and the gallery will update right away.</span>
                </article>
            `;
        }

        function renderGallery() {
            gallery.innerHTML = "";

            if (activeFilter === "gear") {
                gallery.classList.add("gear-mode");
                pagination.style.display = "none";
                renderEquipmentView();
                updateSummary(1, 1);
                return;
            }

            gallery.classList.remove("gear-mode");
            pagination.style.display = "flex";

            const source = getFilteredPhotos();
            const totalPages = Math.max(1, Math.ceil(source.length / PHOTOS_PER_PAGE));

            if (currentPage > totalPages) {
                currentPage = 1;
            }

            const start = (currentPage - 1) * PHOTOS_PER_PAGE;
            const pagePhotos = source.slice(start, start + PHOTOS_PER_PAGE);

            updateSummary(totalPages, source.length);

            if (pagePhotos.length === 0) {
                renderEmptyState();
                return;
            }

            pagePhotos.forEach((photo, index) => {
                const item = document.createElement("article");
                item.className = "gallery-item";
                item.style.animationDelay = Math.min(index * 45, 360) + "ms";
                item.innerHTML = `
                    <a class="gallery-link" href="${photo.img}" data-lightbox="true" data-title="${photo.caption}" data-tag="${getTagLabel(photo.tags)}">
                        <div class="gallery-image-wrap">
                            <img src="${photo.img}" alt="${photo.caption}" loading="lazy">
                        </div>
                        <div class="caption">
                            <span class="caption-title">${photo.caption}</span>
                            <span class="caption-tag">${getTagLabel(photo.tags)}</span>
                        </div>
                    </a>
                `;
                gallery.appendChild(item);
            });
        }

        function updatePagination() {
            if (activeFilter === "gear") {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }

            const totalPages = Math.max(1, Math.ceil(getFilteredPhotos().length / PHOTOS_PER_PAGE));
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;
        }

        function openLightbox(src, title, tag) {
            lightboxImage.src = src;
            lightboxImage.alt = title;
            lightboxTitle.textContent = title;
            lightboxTag.textContent = tag;
            lightbox.classList.add("active");
            lightbox.setAttribute("aria-hidden", "false");
            document.body.style.overflow = "hidden";
        }

        function closeLightbox() {
            lightbox.classList.remove("active");
            lightbox.setAttribute("aria-hidden", "true");
            lightboxImage.src = "";
            lightboxImage.alt = "";
            document.body.style.overflow = "";
        }

        function applyFilter(filter) {
            activeFilter = filterLabels[filter] ? filter : "all";
            currentPage = 1;

            const url = new URL(window.location.href);
            url.searchParams.set("filter", activeFilter);
            history.pushState({}, "", url);

            updateTagLinksUI();
            renderGallery();
            updatePagination();
        }

        prevBtn.addEventListener("click", () => {
            if (currentPage > 1) {
                currentPage -= 1;
                renderGallery();
                updatePagination();
            }
        });

        nextBtn.addEventListener("click", () => {
            const totalPages = Math.max(1, Math.ceil(getFilteredPhotos().length / PHOTOS_PER_PAGE));
            if (currentPage < totalPages) {
                currentPage += 1;
                renderGallery();
                updatePagination();
            }
        });

        document.querySelectorAll(".tag-link").forEach((link) => {
            link.addEventListener("click", (event) => {
                event.preventDefault();
                const filter = link.getAttribute("data-filter");
                applyFilter(filter);
            });
        });

        gallery.addEventListener("click", (event) => {
            const link = event.target.closest("[data-lightbox='true']");
            if (!link) return;
            if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;

            event.preventDefault();
            openLightbox(
                link.getAttribute("href"),
                link.getAttribute("data-title") || "",
                link.getAttribute("data-tag") || ""
            );
        });

        lightboxClose.addEventListener("click", closeLightbox);
        lightbox.addEventListener("click", (event) => {
            if (event.target === lightbox) {
                closeLightbox();
            }
        });

        window.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && lightbox.classList.contains("active")) {
                closeLightbox();
            }
        });

        window.addEventListener("popstate", () => {
            const filterFromUrl = new URLSearchParams(window.location.search).get("filter") || "all";
            activeFilter = filterLabels[filterFromUrl] ? filterFromUrl : "all";
            currentPage = 1;
            updateTagLinksUI();
            renderGallery();
            updatePagination();
        });

        const initialFilter = new URLSearchParams(window.location.search).get("filter");
        if (initialFilter && filterLabels[initialFilter]) {
            activeFilter = initialFilter;
        }

        updateFilterCounts();
        updateTagLinksUI();
        renderGallery();
        updatePagination();
    </script>
</body>
</html>
