<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photography Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(90deg, #232526 0%, #414345 100%);
            color: #fff;
            text-align: center;
            padding: 2.75rem 1rem 2rem 1rem;
            border-radius: 18px; /* rounded on all corners for a softer look */
            box-shadow: 0 8px 40px rgba(0,0,0,0.16);
            margin: 20px auto 32px auto;
            position: relative;
            overflow: hidden;
            max-width: 1200px; /* keep header nicely centered within container */
            border: 1px solid rgba(255,255,255,0.03);
        }
        .back-btn {
            position: absolute;
            top: 24px;
            left: 32px;
            background: rgba(0,0,0,0.18);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 10px 22px 10px 38px;
            font-size: 1.08rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            transition: background 0.2s, box-shadow 0.2s;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover {
            background: rgba(0,0,0,0.32);
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
        }
        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
            margin-right: 6px;
        }
        header h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            z-index: 1;
            position: relative;
            text-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }
        header p {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 400;
            color: #e0e0e0;
            z-index: 1;
            position: relative;
            letter-spacing: 1px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        /* Gallery wrapper. We'll render the first row separately so it is strictly
           top-aligned, then render the remaining photos below in a masonry-style
           column flow so later rows can interleave. */
        .gallery {
            display: block;
            width: 100%;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 32px 0 0 0;
            gap: 32px;
        }
        .page-btn {
            background: rgba(0,0,0,0.18);
            border: none;
            outline: none;
            cursor: pointer;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            position: relative;
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .page-btn svg {
            width: 32px;
            height: 32px;
            fill: #fff;
            opacity: 0.7;
        }
        .page-info {
            color: #333;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }
        /* Gallery items used in the column layout. */
        .gallery-item {
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            overflow: visible;
            transition: transform 0.18s ease;
            display: block;
            position: relative;
            cursor: pointer;
        }

        /* Layout: two-column page with a sticky sidebar and masonry gallery */
        .main-grid {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 28px;
            max-width: 2000px; /* increased so images render larger */
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }
            .main-grid {
                display: grid;
                grid-template-columns: 180px 1fr;
                gap: 28px;
                max-width: 2000px; /* increased so images render larger */
                margin: 0 auto;
                padding: 20px;
                box-sizing: border-box;
                height: 100vh; /* keep grid full viewport so main can scroll internally */
            }
        .sidebar {
            width: 100%;
            position: sticky;
            top: 0;
            height: 100vh; /* keep sidebar full height and fixed in view */
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            padding-top: 20px;
        }
        .sidebar .filters {
            background: transparent; /* not a card - plain sidebar */
            padding: 8px 0; /* small vertical spacing */
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: center; /* center contents horizontally */
            justify-content: center; /* center vertically within its area */
            /* center filters vertically inside sidebar */
            margin-top: auto;
            margin-bottom: auto;
        }
        .sidebar .brand { margin: 0 0 12px 0; font-size: 2.2rem; font-family: "Brush Script MT", "Lucida Handwriting", cursive; font-weight: 600; text-align: center; transform: translateY(-18px); }
        .sidebar .brand a { color: inherit; text-decoration: none; display: inline-block; }
        .tags { display: flex; flex-direction: column; gap: 6px; align-items: center; }
        .tag-row { display:flex; gap:35px; flex-wrap:wrap; justify-content: center; }
        /* equipment (removed) */
        .tag-link {
            background: transparent;
            border: none;
            padding: 0;
            color: #111;
            text-decoration: none;
            font-weight: 400; /* not bold */
            cursor: pointer;
            transition: color 0.18s, opacity 0.18s;
        }
        .tag-link:hover { opacity: 0.7; }
        .tag-link.active { color: #6b7280; /* gray when active */ }

        /* Masonry via CSS columns */
        .gallery {
            column-gap: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        .gallery.masonry { column-count: 4; }
        .gallery-item { display: inline-block; width: 100%; break-inside: avoid; margin-bottom: 16px; position: relative; transition: opacity 0.28s, transform 0.28s; }
        .gallery-item:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }
        .gallery-item .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 8px;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
            box-sizing: border-box; /* ensure padding doesn't expand width */
            border-radius: 0; /* square caption */
        }
        .gallery-item:hover .caption {
            opacity: 1;
        }
          /* Images keep their intrinsic proportions and won't be forced to a fixed card size.
              They will scale down to the item width if too large. */
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 0; /* remove rounded corners */
            transition: transform 0.28s, box-shadow 0.28s;
        }

        .gallery-item.hidden { opacity: 0; transform: scale(0.98); pointer-events: none; }
        .placeholder {
            display: block;
            width: 100%;
            text-align: center;
            color: #111111;
            padding: 12px 8px;
            box-sizing: border-box;
        }

        /* Responsive: adjust number of columns (by changing column flex-basis) */
        /* responsive columns count */
        @media (max-width: 1199px) { .gallery.masonry { column-count: 3; } }
        @media (max-width: 899px)  { .gallery.masonry { column-count: 2; } .main-grid { grid-template-columns: 180px 1fr; } }
        @media (max-width: 599px)  { .gallery.masonry { column-count: 1; } .main-grid { grid-template-columns: 1fr; } .sidebar { order: -1; }
            .sidebar .filters { display:flex; gap:8px; overflow:auto; justify-content:flex-start; min-height: auto; padding: 8px 0; }
            .tags { flex-direction:row; }
        }
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0; top: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox-close {
            position: absolute;
            top: 40px;
            right: 60px;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 10000;
        }
        /* footer is positioned inside the sidebar filters and centered horizontally */
        .sidebar > .site-footer {
            margin-top: auto;
            margin-bottom: 50px;
            align-self: center;
            color: #000000;
            font-size: 0.77rem;
            z-index: 5;
            background: transparent;
            padding: 4px 6px;
            text-align: center;
        }
            /* make the right column scroll independently */
            main {
                height: 100vh;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                box-sizing: border-box;
                padding-right: 12px;
            }
    </style>
</head>
<body>



<div class="main-grid">
    <aside class="sidebar">
        <div class="filters">
            <h1 class="brand"><a href="/">Simon Ji</a></h1>
            <div class="tags tag-row">
                <a class="tag-link" data-filter="day" href="?filter=day">Natural Light</a>
                <a class="tag-link" data-filter="night" href="?filter=night">After Dark</a>
                <a class="tag-link active" data-filter="all" href="?filter=all">All Frames</a>
            </div>
        </div>
        <div class="site-footer">© Copyright 2026 Simon Ji</div>
    </aside>
    <main>
        <section class="gallery masonry" id="gallery" aria-live="polite"></section>
        <div class="pagination" style="margin-bottom: 60px;">
            <button class="page-btn" id="prevBtn">
                <svg viewBox="0 0 24 24"><polygon points="15.5,19 9.5,12 15.5,5"/></svg>
            </button>
            <span class="page-info" id="pageInfo"></span>
            <button class="page-btn" id="nextBtn">
                <svg viewBox="0 0 24 24"><polygon points="8.5,5 14.5,12 8.5,19"/></svg>
            </button>
        </div>
    </main>
</div>

<div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="Enlarged photo">
    <!-- caption removed from lightbox -->
</div>


<script>
    // Photo data (add 'tags' as space-separated keywords: day, night, gear)
    const photos = [
        { caption: "Road back home", img: "images/Road_back_home.JPG", tags: "night" },
        { caption: "IFS", img: "images/IFS.JPG", tags: "night" },
        { caption: "Library", img: "images/Lib.JPG", tags: "night" },
        { caption: "A&M Bell Tower", img: "images/Bell_tower.JPG", tags: "night" },
        { caption: "Station", img: "images/Station.JPG", tags: "night" },
        { caption: "Crowd", img: "images/Crowd.JPG", tags: "night" },
        { caption: "Legacy & Vision", img: "images/DSC_2009.jpg", tags: "night" },
        { caption: "Lotus", img: "images/DSC_2428.jpg", tags: "day" },
        { caption: "Ancient Lighthouse", img: "images/DSC_2403.jpg", tags: "day" },
        // { caption: "San Francisco ChinaTown", img: "images/DSC_2974.JPG", tags: "day" },
        { caption: "Lake View", img: "images/Lakeview.JPG", tags: "day" },
        { caption: "Silence", img: "images/f469249cd7dc29f9e1082b942ed40206.JPG", tags: "day" },
        { caption: "Main Library", img: "images/MainLibrary.JPG", tags: "day" },
        { caption: "Tech", img: "images/Tech.JPG", tags: "day" },
        { caption: "Meditation", img: "images/Zone.JPG", tags: "day" },
        { caption: "Skyscraper", img: "images/Skyscraper.JPG", tags: "night" },
        { caption: "Aurora", img: "images/Aurora.JPG", tags: "night" },
        { caption: "Snow Fog", img: "images/Snow fog.jpg", tags: "day" },
        { caption: "CHRISTKINDL MARKET", img: "images/CHRISTKINDL MARKET.JPG", tags: "night" },
        { caption: "Christmas tree", img: "images/Christmas tree.JPG", tags: "day" },
        { caption: "Ferry", img: "images/Ferry.JPG", tags: "day" },
        { caption: "Lady Liberty", img: "images/Lady Liberty.JPG", tags: "day" },
        { caption: "Night NYC", img: "images/Night NYC.jpg", tags: "night" },
        { caption: "Ice Skating", img: "images/Ice Skating.JPG", tags: "night" }
    ];

    // newest first
    const photosReversed = photos.slice().reverse();
    const PHOTOS_PER_PAGE = 12;
    let currentPage = 1;
    let activeFilter = 'all';

    function getFilteredPhotos() {
        if (activeFilter === 'all') return photosReversed.slice();
        return photosReversed.filter(p => (p.tags || '').split(/\s+/).includes(activeFilter));
    }

    function renderGallery() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';
        // ensure pagination visible for normal photos
        document.querySelectorAll('.pagination').forEach(p => p.style.display = 'flex');
        const source = getFilteredPhotos();
        const start = (currentPage - 1) * PHOTOS_PER_PAGE;
        const end = start + PHOTOS_PER_PAGE;
        const pagePhotos = source.slice(start, end);

        if (pagePhotos.length === 0 && currentPage > 1) {
            currentPage = 1;
            return renderGallery();
        }

        pagePhotos.forEach(photo => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.setAttribute('data-caption', photo.caption);
            item.setAttribute('data-img', photo.img);
            item.setAttribute('data-tags', photo.tags || '');
            item.innerHTML = `
                <img src="${photo.img}" alt="${photo.caption}" loading="lazy">
                <div class="caption">${photo.caption}</div>
            `;
            gallery.appendChild(item);
        });

        // no placeholder text when fewer photos than a full page

        // click -> lightbox (preserve existing behavior)
        document.querySelectorAll('.gallery-item').forEach(item => {
            item.addEventListener('click', function() {
                const imgSrc = this.getAttribute('data-img');
                document.getElementById('lightbox-img').src = imgSrc;
                document.getElementById('lightbox').classList.add('active');
            });
        });
    }

    function updatePagination() {
        const totalPages = Math.ceil(getFilteredPhotos().length / PHOTOS_PER_PAGE) || 1;
        document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage === totalPages;
    }

    document.getElementById('prevBtn').onclick = function() {
        if (currentPage > 1) {
            currentPage--;
            renderGallery();
            updatePagination();
        }
    };
    document.getElementById('nextBtn').onclick = function() {
        const totalPages = Math.ceil(getFilteredPhotos().length / PHOTOS_PER_PAGE) || 1;
        if (currentPage < totalPages) {
            currentPage++;
            renderGallery();
            updatePagination();
        }
    };

    // initialize active filter from URL (?filter=...)
    const urlParams = new URLSearchParams(window.location.search);
    const initialFilter = urlParams.get('filter');
    if (initialFilter) activeFilter = initialFilter;

    // tag links behavior: update URL (pushState), apply filter in-page, and highlight
    function updateTagLinksUI() {
        document.querySelectorAll('.tag-link').forEach(b => b.classList.remove('active'));
        if (activeFilter === 'all') {
            document.querySelectorAll('.tag-link[data-filter="all"]').forEach(b => b.classList.add('active'));
        } else {
            document.querySelectorAll(`.tag-link[data-filter="${activeFilter}"]`).forEach(b => b.classList.add('active'));
        }
    }

    document.querySelectorAll('.tag-link').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const filter = this.getAttribute('data-filter');
            activeFilter = (filter === activeFilter) ? 'all' : filter;
            // update URL without reload
            const u = new URL(window.location.href);
            u.searchParams.set('filter', activeFilter);
            history.pushState({}, '', u);
            updateTagLinksUI();
            // (equipment removed) ensure no gear UI remains
            currentPage = 1;
            renderGallery();
            updatePagination();
        });
    });

    // gear removed: no handler

    // handle back/forward navigation
    window.addEventListener('popstate', function() {
        const p = new URLSearchParams(window.location.search).get('filter') || 'all';
        activeFilter = p;
        updateTagLinksUI();
        currentPage = 1;
        renderGallery();
        updatePagination();
    });

    // reflect initial filter UI
    updateTagLinksUI();

    document.getElementById('lightbox-close').onclick = function() {
        document.getElementById('lightbox').classList.remove('active');
        document.getElementById('lightbox-img').src = '';
    };
    document.getElementById('lightbox').onclick = function(e) {
        if(e.target === this) {
            this.classList.remove('active');
            document.getElementById('lightbox-img').src = '';
        }
    };

    // initial render
    renderGallery();
    updatePagination();
</script>

</body>
</html>
